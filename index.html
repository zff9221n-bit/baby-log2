<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝贝成长台账</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <h1 class="text-2xl font-bold text-indigo-600 mb-6 text-center">🍼 宝贝成长台账</h1>

    <div class="bg-white p-6 rounded-2xl shadow-sm mb-4 border border-slate-100">
        <h2 class="text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider">记录喂奶</h2>
        <div class="flex items-center gap-2 mb-4">
            <input type="number" id="milkAmount" value="120" 
                   class="border-2 border-slate-200 rounded-xl p-3 w-full text-xl focus:outline-none focus:border-indigo-500"
                   placeholder="毫升">
            <span class="text-slate-400 font-bold">ml</span>
        </div>
        <div class="grid grid-cols-4 gap-2 mb-4">
            <button onclick="setAmount(60)" class="bg-slate-100 py-2 rounded-lg text-slate-600 text-sm">60</button>
            <button onclick="setAmount(120)" class="bg-slate-100 py-2 rounded-lg text-slate-600 text-sm">120</button>
            <button onclick="setAmount(150)" class="bg-slate-100 py-2 rounded-lg text-slate-600 text-sm">150</button>
            <button onclick="setAmount(180)" class="bg-slate-100 py-2 rounded-lg text-slate-600 text-sm">180</button>
        </div>
        <button onclick="logFeeding()" class="w-full bg-indigo-500 text-white p-4 rounded-xl font-bold text-lg shadow-lg shadow-indigo-200 active:scale-95 transition-transform">
            ✅ 记录喂奶
        </button>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm mb-4 border border-slate-100">
        <h2 class="text-sm font-bold mb-3 text-slate-500 uppercase tracking-wider">睡眠管理</h2>
        <div class="grid grid-cols-2 gap-4">
            <button id="btnStartSleep" onclick="startSleep()" class="flex flex-col items-center bg-violet-500 text-white p-4 rounded-xl font-bold shadow-lg shadow-violet-100 active:scale-95 transition-transform">
                <span class="text-2xl mb-1">💤</span>
                <span>开始睡觉</span>
            </button>
            <button id="btnEndSleep" onclick="endSleep()" class="flex flex-col items-center bg-amber-400 text-white p-4 rounded-xl font-bold shadow-lg shadow-amber-100 active:scale-95 transition-transform">
                <span class="text-2xl mb-1">☀️</span>
                <span>醒来了</span>
            </button>
        </div>
        <p id="sleepStatus" class="text-center text-xs text-slate-400 mt-3 italic">当前状态：清醒中</p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex justify-between items-center text-sm border border-slate-100">
        <div class="flex items-center gap-2">
            <span class="text-slate-500">提醒:</span>
            <input type="number" id="remindInterval" value="3" class="border rounded p-1 w-10 text-center">
            <span class="text-slate-500">小时后</span>
        </div>
        <button onclick="setReminder()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold">设定闹钟</button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-slate-700">最近动态</h2>
            <button onclick="clearAll()" class="text-xs text-slate-300 hover:text-red-400 transition-colors">清空本地数据</button>
        </div>
        <ul id="logList" class="space-y-4"></ul>
    </div>

    <script>
        // 初始化数据库
        const db = new Dexie("BabyTrackerPro");
        db.version(2).stores({ 
            logs: "++id, type, startTime, endTime, value, duration" 
        });

        // 睡眠逻辑变量
        let sleepStartTime = localStorage.getItem('lastSleepTime');
        updateSleepStatusUI();

        function setAmount(num) {
            document.getElementById('milkAmount').value = num;
        }

        // 1. 喂奶记录
        async function logFeeding() {
            const amount = document.getElementById('milkAmount').value;
            await db.logs.add({ 
                type: '🍼 喂奶', 
                startTime: new Date().toISOString(), 
                value: amount + 'ml' 
            });
            renderLogs();
        }

        // 2. 开始睡觉
        function startSleep() {
            const now = new Date().toISOString();
            localStorage.setItem('lastSleepTime', now);
            sleepStartTime = now;
            updateSleepStatusUI();
            alert("已记录开始睡觉时间");
        }

        // 3. 醒来了（结束睡觉）
        async function endSleep() {
            if (!sleepStartTime) {
                alert("还没有记录开始睡觉的时间哦！");
                return;
            }
            
            const start = new Date(sleepStartTime);
            const end = new Date();
            const diffMs = end - start;
            const diffHrs = Math.floor(diffMs / 3600000);
            const diffMins = Math.round((diffMs % 3600000) / 60000);
            
            const durationStr = `${diffHrs > 0 ? diffHrs + '小时' : ''}${diffMins}分钟`;

            await db.logs.add({
                type: '😴 睡眠',
                startTime: start.toISOString(),
                endTime: end.toISOString(),
                value: durationStr,
                duration: diffMs
            });

            localStorage.removeItem('lastSleepTime');
            sleepStartTime = null;
            updateSleepStatusUI();
            renderLogs();
            alert(`宝宝睡了 ${durationStr}`);
        }

        function updateSleepStatusUI() {
            const statusText = document.getElementById('sleepStatus');
            if (sleepStartTime) {
                const timeStr = new Date(sleepStartTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                statusText.innerText = `当前状态：从 ${timeStr} 开始睡觉中...`;
                statusText.classList.replace('text-slate-400', 'text-indigo-500');
            } else {
                statusText.innerText = `当前状态：清醒中`;
                statusText.classList.replace('text-indigo-500', 'text-slate-400');
            }
        }

        // 渲染列表
        async function renderLogs() {
            const allLogs = await db.logs.orderBy('id').reverse().limit(15).toArray();
            const list = document.getElementById('logList');
            list.innerHTML = allLogs.map(log => {
                const time = new Date(log.startTime).toLocaleTimeString('zh-CN', {hour12:false, hour:'2-digit', minute:'2-digit'});
                return `
                <li class="flex justify-between items-start">
                    <div class="flex flex-col">
                        <span class="font-bold text-slate-800">${log.type}</span>
                        <span class="text-xs text-slate-400">${time}</span>
                    </div>
                    <div class="text-right">
                        <span class="text-indigo-600 font-bold">${log.value}</span>
                    </div>
                </li>`;
            }).join('');
        }

        function setReminder() {
            const hours = document.getElementById('remindInterval').value;
            alert(`闹钟已设定：${hours}小时后提示`);
            setTimeout(() => {
                if (Notification.permission === "granted") {
                    new Notification("🍼 喂奶提醒", { body: "离上次记录已经过去很久啦" });
                }
                alert("🍼 喂奶提醒：时间到啦！");
            }, hours * 3600 * 1000);
        }

        async function clearAll() {
            if(confirm("确定要清空所有历史记录吗？")) {
                await db.logs.clear();
                localStorage.removeItem('lastSleepTime');
                sleepStartTime = null;
                updateSleepStatusUI();
                renderLogs();
            }
        }

        if (Notification.permission !== "denied") Notification.requestPermission();
        renderLogs();
    </script>
</body>
</html>
