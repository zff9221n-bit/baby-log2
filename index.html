<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝贝成长台账-安全增强版</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">
    <div class="bg-gradient-to-br from-teal-500 to-emerald-600 p-6 rounded-b-[2.5rem] shadow-lg mb-6 text-white text-center">
        <h1 class="text-sm opacity-80 mb-4 font-medium tracking-widest">TODAY'S SUMMARY</h1>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-sm">
                <p class="text-[10px] opacity-80">今日总奶量</p>
                <p class="text-2xl font-bold mt-1" id="todayMilk">0 <span class="text-xs">ml</span></p>
            </div>
            <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-sm">
                <p class="text-[10px] opacity-80">今日总睡眠</p>
                <p class="text-2xl font-bold mt-1" id="todaySleep">0 <span class="text-xs">min</span></p>
            </div>
        </div>
    </div>

    <div class="px-5 space-y-6">
        <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-slate-700">🍼 快速记奶</h2>
                <input type="number" id="milkAmount" value="120" class="w-16 border-b-2 border-emerald-400 text-center font-black text-emerald-600 focus:outline-none bg-transparent">
            </div>
            <div class="grid grid-cols-4 gap-3 mb-6">
                <button onclick="setAmount(90)" class="bg-slate-50 py-3 rounded-xl text-sm font-semibold active:bg-emerald-50">90</button>
                <button onclick="setAmount(120)" class="bg-slate-50 py-3 rounded-xl text-sm font-semibold active:bg-emerald-50">120</button>
                <button onclick="setAmount(150)" class="bg-slate-50 py-3 rounded-xl text-sm font-semibold active:bg-emerald-50">150</button>
                <button onclick="setAmount(180)" class="bg-slate-50 py-3 rounded-xl text-sm font-semibold active:bg-emerald-50">180</button>
            </div>
            <button onclick="logFeeding()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 active:scale-[0.98] transition-all">确认记录</button>
        </section>

        <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <h2 class="font-bold text-slate-700 mb-4">😴 睡眠计时</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startSleep()" class="bg-slate-800 text-white py-4 rounded-2xl font-bold flex flex-col items-center active:scale-95 transition-all">
                    <span>开始睡觉</span>
                    <span id="sleepStartTimeDisplay" class="text-[10px] opacity-50 font-normal mt-1">点击开始</span>
                </button>
                <button onclick="endSleep()" class="bg-amber-400 text-amber-900 py-4 rounded-2xl font-bold flex flex-col items-center active:scale-95 transition-all">
                    <span>醒来了</span>
                    <span class="text-[10px] opacity-60 font-normal mt-1 text-amber-800 font-bold tracking-tight">自动结算记录</span>
                </button>
            </div>
        </section>

        <section class="bg-slate-800 p-5 rounded-3xl shadow-xl text-white">
            <h2 class="text-xs font-bold opacity-50 mb-4 tracking-tighter uppercase">数据保险箱</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="exportCSV()" class="bg-white/10 hover:bg-white/20 py-3 rounded-xl text-xs flex items-center justify-center gap-2 border border-white/10">
                    📤 导出备份
                </button>
                <label class="bg-white/10 hover:bg-white/20 py-3 rounded-xl text-xs flex items-center justify-center gap-2 border border-white/10 cursor-pointer text-center">
                    📥 导入恢复
                    <input type="file" id="importFile" class="hidden" accept=".csv" onchange="importCSV(this)">
                </label>
            </div>
        </section>

        <div id="logList" class="space-y-3 pb-10"></div>
    </div>

    <script>
        const db = new Dexie("BabyGuardianDB");
        db.version(1).stores({ logs: "++id, type, timestamp, value, rawValue" });

        let sleepStartTime = localStorage.getItem('lastSleepTime');

        function setAmount(n) { document.getElementById('milkAmount').value = n; }

        async function logFeeding() {
            const v = parseInt(document.getElementById('milkAmount').value);
            await db.logs.add({ type: '喂奶', timestamp: new Date(), value: v + 'ml', rawValue: v });
            updateAll();
        }

        function startSleep() {
            const now = new Date();
            localStorage.setItem('lastSleepTime', now.toISOString());
            sleepStartTime = now.toISOString();
            updateAll();
        }

        async function endSleep() {
            if (!sleepStartTime) return alert("还没有记录开始时间");
            const diffMin = Math.round((new Date() - new Date(sleepStartTime)) / 60000);
            await db.logs.add({
                type: '睡眠',
                timestamp: new Date(),
                value: (diffMin >= 60 ? Math.floor(diffMin/60)+'h'+(diffMin%60)+'m' : diffMin+'m'),
                rawValue: diffMin
            });
            localStorage.removeItem('lastSleepTime');
            sleepStartTime = null;
            updateAll();
        }

        async function updateAll() {
            const startOfToday = new Date();
            startOfToday.setHours(0,0,0,0);
            const todayLogs = await db.logs.where('timestamp').above(startOfToday).toArray();
            
            document.getElementById('todayMilk').innerHTML = `${todayLogs.filter(l=>l.type==='喂奶').reduce((s,c)=>s+c.rawValue,0)} <small class='font-normal uppercase tracking-widest text-[10px]'>ml</small>`;
            document.getElementById('todaySleep').innerHTML = `${todayLogs.filter(l=>l.type==='睡眠').reduce((s,c)=>s+c.rawValue,0)} <small class='font-normal uppercase tracking-widest text-[10px]'>min</small>`;

            document.getElementById('sleepStartTimeDisplay').innerText = sleepStartTime ? `从 ${new Date(sleepStartTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} 睡起` : '点击记录';

            const allLogs = await db.logs.orderBy('timestamp').reverse().limit(20).toArray();
            document.getElementById('logList').innerHTML = allLogs.map(l => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="flex items-center gap-3 text-sm">
                        <span class="text-xl">${l.type === '喂奶' ? '🍼' : '😴'}</span>
                        <div>
                            <p class="font-bold">${l.type}</p>
                            <p class="text-[10px] text-slate-400">${new Date(l.timestamp).toLocaleString([],{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</p>
                        </div>
                    </div>
                    <span class="font-black text-emerald-600">${l.value}</span>
                </div>
            `).join('');
        }

        // --- 备份功能 ---
        async function exportCSV() {
            const all = await db.logs.toArray();
            let csv = "类型,时间,数值,原始值\n";
            all.forEach(l => {
                csv += `${l.type},${new Date(l.timestamp).toLocaleString()},${l.value},${l.rawValue}\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `baby_log_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        function importCSV(input) {
            const reader = new FileReader();
            reader.onload = async function() {
                const lines = reader.result.split('\n').slice(1);
                for (let line of lines) {
                    const [type, time, value, raw] = line.split(',');
                    if (type) {
                        await db.logs.add({ type, timestamp: new Date(time), value, rawValue: parseInt(raw) });
                    }
                }
                updateAll();
                alert("导入成功！");
            };
            reader.readAsText(input.files[0]);
        }

        updateAll();
    </script>
</body>
</html>
