<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝贝成长-全功能终极版</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 pb-20 font-sans">
    <div class="bg-indigo-600 p-6 rounded-b-[2.5rem] shadow-lg mb-4 text-white text-center">
        <div class="flex justify-between items-center mb-4 text-left">
            <h1 class="text-lg font-bold tracking-tight">宝贝成长记录</h1>
            <input type="date" id="viewDate" onchange="updateAll()" class="bg-white/20 border-none rounded-lg px-2 py-1 text-sm focus:outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-sm">
                <p class="text-[10px] opacity-70 font-bold">选定日奶量</p>
                <p class="text-xl font-black mt-1" id="todayMilk">0 <small class="text-xs font-normal">ml</small></p>
            </div>
            <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-sm">
                <p class="text-[10px] opacity-70 font-bold">选定日睡眠</p>
                <p class="text-xl font-black mt-1" id="todaySleep">0 <small class="text-xs font-normal">min</small></p>
            </div>
        </div>
    </div>

    <div class="px-4 space-y-6">
        <section class="grid grid-cols-2 gap-3">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-emerald-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] text-emerald-600 font-bold">喂奶提醒</p>
                    <input type="number" id="feedAlert" value="3" class="w-8 font-bold text-sm bg-transparent outline-none"> <span class="text-xs text-slate-400">h</span>
                </div>
                <button onclick="setRemind('feed')" class="bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">开启</button>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-indigo-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] text-indigo-600 font-bold">哄睡提醒</p>
                    <input type="number" id="sleepAlert" value="2" class="w-8 font-bold text-sm bg-transparent outline-none"> <span class="text-xs text-slate-400">h</span>
                </div>
                <button onclick="setRemind('sleep')" class="bg-indigo-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">开启</button>
            </div>
        </section>

        <section class="grid grid-cols-2 gap-4">
            <button onclick="logFeedingPrompt()" class="bg-emerald-500 text-white p-4 rounded-3xl shadow-lg active:scale-95 transition-all text-center">
                <span class="text-xl block">🍼</span>
                <span class="font-bold text-sm">现在喂奶</span>
            </button>
            <button onclick="toggleSleep()" id="sleepBtn" class="bg-indigo-500 text-white p-4 rounded-3xl shadow-lg active:scale-95 transition-all flex flex-col items-center justify-center">
                <span id="sleepEmoji" class="text-xl">💤</span>
                <span id="sleepBtnText" class="font-bold text-sm">开始睡觉</span>
            </button>
        </section>

        <section class="bg-orange-50 p-4 rounded-3xl border border-orange-100">
            <h2 class="text-[10px] font-bold text-orange-400 mb-3 uppercase tracking-widest">忘记记了？事后补录入口</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="manualMilk()" class="bg-white text-orange-600 py-3 rounded-xl shadow-sm font-bold text-xs border border-orange-200">补记一顿奶</button>
                <button onclick="manualSleep()" class="bg-white text-orange-600 py-3 rounded-xl shadow-sm font-bold text-xs border border-orange-200">补记一段觉</button>
            </div>
        </section>

        <section>
            <h2 class="text-[10px] font-bold text-slate-400 mb-2 px-2 uppercase tracking-widest">点击下方记录可修改或删除</h2>
            <div id="logList" class="space-y-2"></div>
        </section>

        <section class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
            <h3 class="text-[10px] font-bold text-slate-400 mb-4 uppercase tracking-[0.2em] text-center">最近7日趋势分析</h3>
            <canvas id="growthChart" class="max-h-44"></canvas>
        </section>

        <section class="bg-slate-800 p-6 rounded-[2rem] text-white">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="exportCSV()" class="bg-white/10 py-3 rounded-xl text-xs font-bold">📤 导出备份</button>
                <label class="bg-white/10 py-3 rounded-xl text-xs font-bold flex items-center justify-center cursor-pointer text-center">
                    📥 导入恢复
                    <input type="file" class="hidden" accept=".csv" onchange="importCSV(this)">
                </label>
            </div>
            <button onclick="clearAll()" class="w-full mt-4 text-[10px] text-red-400/50">清空所有数据</button>
        </section>
    </div>

    <script>
        const db = new Dexie("BabyFinalAllInOne");
        db.version(1).stores({ logs: "++id, type, timestamp, dateStr, value, rawValue" });

        let myChart = null;
        let sleepStartTime = localStorage.getItem('lastSleepTime');
        document.getElementById('viewDate').valueAsDate = new Date();

        // --- 提醒功能 ---
        function setRemind(type) {
            const h = document.getElementById(type === 'feed' ? 'feedAlert' : 'sleepAlert').value;
            const msg = type === 'feed' ? "🍼 饿了，宝宝该喝奶啦！" : "😴 困了，准备哄睡吧！";
            alert(`${h}小时后会弹出提醒，请保持网页开启。`);
            setTimeout(() => {
                alert(msg);
                if (Notification.permission === "granted") new Notification("育儿提醒", { body: msg });
            }, h * 3600000);
        }

        // --- 实时记录 (场景一) ---
        async function logFeedingPrompt() {
            const amount = prompt("刚才喂了多少 ml?", "120");
            if (amount && !isNaN(amount)) saveLog('喂奶', parseInt(amount), amount + 'ml', new Date());
        }

        async function toggleSleep() {
            const now = new Date();
            if (!sleepStartTime) {
                localStorage.setItem('lastSleepTime', now.toISOString());
                sleepStartTime = now.toISOString();
            } else {
                const start = new Date(sleepStartTime);
                const diffMin = Math.round((now - start) / 60000);
                await saveLog('睡眠', diffMin, formatSleep(diffMin), start);
                localStorage.removeItem('lastSleepTime');
                sleepStartTime = null;
            }
            updateAll();
        }

        // --- 手动补录 (场景二) ---
        function manualMilk() {
            const amount = prompt("补录毫升数 (ml):", "120");
            const time = prompt("具体喂奶时间 (HH:mm):", new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}));
            if(amount && time) {
                const d = combineDateAndTime(time);
                saveLog('喂奶', parseInt(amount), amount + 'ml', d);
            }
        }

        function manualSleep() {
            const startStr = prompt("几点开始睡的? (HH:mm):", "13:00");
            const endStr = prompt("几点醒来的? (HH:mm):", "15:00");
            if(startStr && endStr) {
                const d1 = combineDateAndTime(startStr);
                const d2 = combineDateAndTime(endStr);
                const diffMin = Math.round((d2 - d1) / 60000);
                if(diffMin > 0) saveLog('睡眠', diffMin, formatSleep(diffMin), d1);
                else alert("结束时间不能早于开始时间");
            }
        }

        // --- 辅助工具 ---
        function combineDateAndTime(timeStr) {
            const [h, m] = timeStr.split(':');
            const d = new Date(document.getElementById('viewDate').value);
            d.setHours(h, m, 0);
            return d;
        }

        function formatSleep(min) {
            return min >= 60 ? Math.floor(min/60)+'h'+(min%60)+'m' : min+'m';
        }

        async function saveLog(type, raw, val, date) {
            await db.logs.add({
                type, timestamp: date,
                dateStr: date.toISOString().split('T')[0],
                value: val, rawValue: raw
            });
            updateAll();
        }

        // --- 编辑与删除 ---
        async function editItem(id) {
            const item = await db.logs.get(id);
            const action = confirm("【修改内容】请点确定\n【删除记录】请点取消");
            if (action) {
                const newVal = prompt(`修改数值 (${item.type === '喂奶' ? 'ml' : 'min'}):`, item.rawValue);
                const newTime = prompt("修改时间 (HH:mm):", new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}));
                if(newVal && newTime) {
                    const d = combineDateAndTime(newTime);
                    const display = item.type === '喂奶' ? newVal + 'ml' : formatSleep(newVal);
                    await db.logs.update(id, { rawValue: parseInt(newVal), value: display, timestamp: d, dateStr: d.toISOString().split('T')[0] });
                    updateAll();
                }
            } else {
                if(confirm("确定要删除这条记录吗？")) {
                    await db.logs.delete(id);
                    updateAll();
                }
            }
        }

        // --- 渲染与图表 ---
        async function updateAll() {
            const selectedDate = document.getElementById('viewDate').value;
            const dayLogs = await db.logs.where('dateStr').equals(selectedDate).toArray();
            
            document.getElementById('todayMilk').innerText = dayLogs.filter(l=>l.type==='喂奶').reduce((a,b)=>a+b.rawValue,0);
            document.getElementById('todaySleep').innerText = dayLogs.filter(l=>l.type==='睡眠').reduce((a,b)=>a+b.rawValue,0);

            const btn = document.getElementById('sleepBtn');
            btn.className = sleepStartTime ? "bg-amber-400 text-amber-900 p-4 rounded-3xl shadow-lg active:scale-95 text-center" : "bg-indigo-500 text-white p-4 rounded-3xl shadow-lg active:scale-95 text-center";
            document.getElementById('sleepBtnText').innerText = sleepStartTime ? "醒来了" : "开始睡觉";
            document.getElementById('sleepEmoji').innerText = sleepStartTime ? "☀️" : "💤";

            const list = document.getElementById('logList');
            list.innerHTML = dayLogs.sort((a,b)=>b.timestamp-a.timestamp).map(l => `
                <div onclick="editItem(${l.id})" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100 active:bg-slate-50 transition-all">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">${l.type === '喂奶' ? '🍼' : '😴'}</span>
                        <div>
                            <p class="font-bold text-slate-700 text-sm">${l.type}</p>
                            <p class="text-[10px] text-slate-400">${new Date(l.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})}</p>
                        </div>
                    </div>
                    <span class="font-black ${l.type === '喂奶' ? 'text-emerald-500' : 'text-indigo-500'}">${l.value}</span>
                </div>
            `).join('') || `<div class="text-center py-8 text-slate-200 text-xs italic">该日无记录</div>`;

            renderChart();
        }

        async function renderChart() {
            const all = await db.logs.toArray();
            const last7Days = [...Array(7)].map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6 - i));
                return d.toISOString().split('T')[0];
            });
            const milkData = last7Days.map(d => all.filter(l => l.dateStr === d && l.type === '喂奶').reduce((a,b)=>a+b.rawValue, 0));
            const sleepData = last7Days.map(d => all.filter(l => l.dateStr === d && l.type === '睡眠').reduce((a,b)=>a+b.rawValue, 0));

            const ctx = document.getElementById('growthChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: last7Days.map(d => d.slice(5)),
                    datasets: [
                        { label: '奶量(ml)', data: milkData, backgroundColor: '#10b981', borderRadius: 4 },
                        { label: '睡眠(min)', data: sleepData, backgroundColor: '#6366f1', borderRadius: 4 }
                    ]
                },
                options: { 
                    responsive: true, 
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: {size: 10} } } }, 
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: {size: 9} } } } 
                }
            });
        }

        // --- 备份与导入 ---
        async function exportCSV() {
            const all = await db.logs.toArray();
            let csv = "日期,类型,具体时间,数值,原始值\n";
            all.forEach(l => csv += `${l.dateStr},${l.type},${l.timestamp.toISOString()},${l.value},${l.rawValue}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `baby_data_full.csv`;
            a.click();
        }

        function importCSV(input) {
            const reader = new FileReader();
            reader.onload = async function() {
                const lines = reader.result.split('\n').slice(1);
                for (let line of lines) {
                    const [dateStr, type, timestamp, value, rawValue] = line.split(',');
                    if (type) await db.logs.add({ dateStr, type, timestamp: new Date(timestamp), value, rawValue: parseInt(rawValue) });
                }
                alert("导入成功"); updateAll();
            };
            reader.readAsText(input.files[0]);
        }

        async function clearAll() {
            if(confirm("确定永久清空所有记录吗？")) {
                await db.logs.clear(); localStorage.clear(); location.reload();
            }
        }

        if (Notification.permission !== "denied") Notification.requestPermission();
        updateAll();
    </script>
</body>
</html>
