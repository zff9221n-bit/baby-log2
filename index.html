<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝贝成长台账-专业版</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">
    <div class="bg-indigo-600 p-6 rounded-b-[2.5rem] shadow-lg mb-4 text-white">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-lg font-bold">宝贝成长看板</h1>
            <input type="date" id="viewDate" onchange="updateAll()" class="bg-white/20 border-none rounded-lg px-2 py-1 text-sm focus:outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-sm text-center">
                <p class="text-[10px] opacity-70">选定日奶量</p>
                <p class="text-xl font-bold mt-1" id="todayMilk">0 <small class="text-[10px] font-normal">ml</small></p>
            </div>
            <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-sm text-center">
                <p class="text-[10px] opacity-70">选定日睡眠</p>
                <p class="text-xl font-bold mt-1" id="todaySleep">0 <small class="text-[10px] font-normal">min</small></p>
            </div>
        </div>
    </div>

    <div class="px-4 space-y-4">
        <section class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-tighter">最近7日趋势</h3>
            <canvas id="growthChart" class="max-h-48"></canvas>
        </section>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="logFeedingPrompt()" class="bg-emerald-500 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                🍼 快速记奶
            </button>
            <button onclick="toggleSleep()" id="sleepBtn" class="bg-indigo-500 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex flex-col items-center">
                <span id="sleepBtnText">开始睡觉</span>
                <span id="sleepTimer" class="text-[10px] font-normal opacity-70">点击开始</span>
            </button>
        </div>

        <section>
            <h2 id="listTitle" class="text-sm font-bold text-slate-500 px-2 mb-3 tracking-tight">选定日详情</h2>
            <div id="logList" class="space-y-2"></div>
        </section>

        <section class="bg-slate-100 p-4 rounded-2xl flex justify-between gap-4">
            <button onclick="exportCSV()" class="text-[10px] text-slate-500 font-bold uppercase">📤 导出备份</button>
            <button onclick="clearAll()" class="text-[10px] text-red-300 font-bold uppercase">🗑️ 清空数据</button>
        </section>
    </div>

    <script>
        const db = new Dexie("BabyProDB");
        db.version(1).stores({ logs: "++id, type, timestamp, dateStr, value, rawValue" });

        let myChart = null;
        let sleepStartTime = localStorage.getItem('lastSleepTime');
        document.getElementById('viewDate').valueAsDate = new Date();

        // 1. 记奶弹出提示（为了界面简洁，点击后弹出输入）
        async function logFeedingPrompt() {
            const amount = prompt("请输入喂奶毫升数(ml):", "120");
            if (amount) {
                const val = parseInt(amount);
                const now = new Date();
                await db.logs.add({
                    type: '喂奶',
                    timestamp: now,
                    dateStr: now.toISOString().split('T')[0],
                    value: val + 'ml',
                    rawValue: val
                });
                updateAll();
            }
        }

        // 2. 睡眠切换逻辑
        async function toggleSleep() {
            const now = new Date();
            if (!sleepStartTime) {
                localStorage.setItem('lastSleepTime', now.toISOString());
                sleepStartTime = now.toISOString();
            } else {
                const start = new Date(sleepStartTime);
                const diffMin = Math.round((now - start) / 60000);
                await db.logs.add({
                    type: '睡眠',
                    timestamp: now,
                    dateStr: start.toISOString().split('T')[0],
                    value: diffMin + 'm',
                    rawValue: diffMin
                });
                localStorage.removeItem('lastSleepTime');
                sleepStartTime = null;
            }
            updateAll();
        }

        // 3. 核心统计与更新
        async function updateAll() {
            const selectedDate = document.getElementById('viewDate').value;
            
            // A. 更新统计数值
            const dayLogs = await db.logs.where('dateStr').equals(selectedDate).toArray();
            const milkSum = dayLogs.filter(l => l.type === '喂奶').reduce((a, b) => a + b.rawValue, 0);
            const sleepSum = dayLogs.filter(l => l.type === '睡眠').reduce((a, b) => a + b.rawValue, 0);
            
            document.getElementById('todayMilk').innerHTML = `${milkSum} <small class="text-xs">ml</small>`;
            document.getElementById('todaySleep').innerHTML = `${sleepSum} <small class="text-xs">min</small>`;

            // B. 更新睡眠按钮UI
            const btn = document.getElementById('sleepBtn');
            const btnTxt = document.getElementById('sleepBtnText');
            const timerTxt = document.getElementById('sleepTimer');
            if(sleepStartTime) {
                btn.className = "bg-amber-400 text-amber-900 p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex flex-col items-center text-center";
                btnTxt.innerText = "醒来了";
                timerTxt.innerText = `自 ${new Date(sleepStartTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} 起`;
            } else {
                btn.className = "bg-indigo-500 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex flex-col items-center text-center";
                btnTxt.innerText = "开始睡觉";
                timerTxt.innerText = "记录作息";
            }

            // C. 渲染详情列表
            const list = document.getElementById('logList');
            document.getElementById('listTitle').innerText = `${selectedDate} 详细记录`;
            list.innerHTML = dayLogs.sort((a,b) => b.timestamp - a.timestamp).map(l => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">${l.type === '喂奶' ? '🍼' : '😴'}</span>
                        <span class="text-xs font-bold text-slate-400">${new Date(l.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                        <span class="font-bold text-slate-700">${l.type}</span>
                    </div>
                    <span class="font-black ${l.type === '喂奶' ? 'text-emerald-500' : 'text-indigo-500'}">${l.value}</span>
                </div>
            `).join('') || `<p class="text-center text-slate-300 py-10 text-xs italic">该日暂无记录</p>`;

            // D. 渲染图表
            renderChart();
        }

        async function renderChart() {
            const all = await db.logs.toArray();
            const last7Days = [...Array(7)].map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                return d.toISOString().split('T')[0];
            });

            const milkData = last7Days.map(date => 
                all.filter(l => l.dateStr === date && l.type === '喂奶').reduce((a,b)=>a+b.rawValue, 0)
            );
            const sleepData = last7Days.map(date => 
                all.filter(l => l.dateStr === date && l.type === '睡眠').reduce((a,b)=>a+b.rawValue, 0)
            );

            const ctx = document.getElementById('growthChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: last7Days.map(d => d.slice(5)), // 只显示月-日
                    datasets: [
                        { label: '奶量(ml)', data: milkData, backgroundColor: '#10b981', borderRadius: 5 },
                        { label: '睡眠(min)', data: sleepData, backgroundColor: '#6366f1', borderRadius: 5 }
                    ]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, display: false }, x: { grid: { display: false } } },
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
                }
            });
        }

        // 备份功能
        async function exportCSV() {
            const all = await db.logs.toArray();
            let csv = "日期,类型,具体时间,数值,原始值\n";
            all.forEach(l => csv += `${l.dateStr},${l.type},${new Date(l.timestamp).toLocaleString()},${l.value},${l.rawValue}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `baby_pro_data.csv`;
            a.click();
        }

        async function clearAll() {
            if(confirm("确定永久删除所有数据吗？")) {
                await db.logs.clear();
                localStorage.clear();
                location.reload();
            }
        }

        updateAll();
    </script>
</body>
</html>
